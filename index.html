<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>GymTrack</title>
    <meta name="description" content="Tu seguimiento de gimnasio personal" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function() {
        var saved = localStorage.getItem('gymtrack_theme') || 'default'
        var isLight = saved.startsWith('light')
        var color = isLight ? '#ffffff' : '#000000'
        var tc = document.createElement('meta')
        tc.name = 'theme-color'
        tc.content = color
        document.head.appendChild(tc)
        if (saved !== 'default') document.documentElement.setAttribute('data-theme', saved)
      })()
    </script>
    <meta name="apple-mobile-web-app-title" content="GymTrack" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
